version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg15
    container_name: km-postgres
    environment:
      POSTGRES_USER: kmuser
      POSTGRES_PASSWORD: kmpass
      POSTGRES_DB: km_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 后端 (开发模式，使用 nodemon)
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: km-server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://kmuser:kmpass@postgres:5432/km_db
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-zhipu}
      PORT: 3001
      NODE_ENV: development
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    command: npm run start:dev

  # Next.js 前端 (开发模式)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: km-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - server
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
