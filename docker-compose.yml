version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:pg15
    container_name: km-postgres
    environment:
      POSTGRES_USER: kmuser
      POSTGRES_PASSWORD: kmpass
      POSTGRES_DB: km_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: km-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # NestJS 后端 (开发模式，使用 nodemon)
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.dev
    container_name: km-server
    env_file:
      - ./apps/server/.env
    ports:
      - "3001:3001"
    environment:
      # Docker 内部网络覆盖（.env 中的 localhost → 服务名）
      DATABASE_URL: postgresql://kmuser:kmpass@postgres:5432/km_db
      REDIS_HOST: redis
      NODE_ENV: development
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/server:/app
      - /app/node_modules
    command: npm run start:dev

  # Next.js 前端 (开发模式)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: km-web
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
