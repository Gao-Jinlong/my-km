<h2>Markdown 编辑器编辑模式</h2>
<p class="subtitle">选择你偏好的编辑体验</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>所见即所得 (WYSIWYG)</h3>
      <p>类似 Notion、语雀。输入 <code># 标题</code> 后立即变成标题样式，源码模式可选</p>
      <div class="mockup" style="margin-top: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 12px;">
        <div style="font-size: 20px; font-weight: bold; margin-bottom: 8px;">标题</div>
        <div style="color: #666;">正文内容，<strong>加粗</strong> <em>斜体</em> 直接显示效果</div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>分屏预览</h3>
      <p>左侧编辑 Markdown 源码，右侧实时预览渲染效果</p>
      <div class="split" style="margin-top: 12px; display: flex; gap: 8px;">
        <div style="flex: 1; background: #f5f5f5; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 12px;"># 标题<br><br>正文内容</div>
        <div style="flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 4px;"><div style="font-size: 16px; font-weight: bold;">标题</div><div style="color: #666; font-size: 12px;">正文内容</div></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>即时渲染 (Typora 式)</h3>
      <p>编辑时看到渲染效果，双击进入源码编辑，行内公式/代码可切换视图</p>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>双模式切换</h3>
      <p>顶部提供「编辑」/「预览」按钮切换，编辑时纯源码，预览时纯渲染</p>
    </div>
  </div>
</div>

<p style="margin-top: 16px; font-size: 14px; color: #666;">💡 提示：点击选项可选择</p>
